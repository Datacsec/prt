<template>

          :style="{ paddingLeft: `${ligne.profondeur * 20 + 12}px` }"
        >
          <!-- Chevron dossier -->
          <button
            v-if="ligne.type === 'folder'"
            type="button"
            class="flex h-6 w-6 shrink-0 items-center justify-center rounded text-gray-400 hover:bg-gray-100 hover:text-gray-600"
            @click="basculer(ligne.id)"
          >
            <svg
              :class="['h-3.5 w-3.5 transition-transform', ouverts[ligne.id] ? 'rotate-90' : '']"
              fill="none"

              viewBox="0 0 24 24"
            >
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />

          </button>
          <span v-else class="w-6 shrink-0" />

          <!-- Icône -->
          <span
            :class="[
              'flex h-8 w-8 shrink-0 items-center justify-center rounded-lg',
              ligne.type === 'folder' ? 'bg-amber-100 text-amber-600' : 'bg-slate-100 text-slate-500'

          >
            <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">
              <path
                v-if="ligne.type === 'folder'"

                d="M2.25 12.75V12A2.25 2.25 0 014.5 9.75h4.257a1.125 1.125 0 01.97-.562l2.684-1.347a1.125 1.125 0 011.03 0l2.684 1.347a1.125 1.125 0 00.97.562H19.5A2.25 2.25 0 0121.75 12v.75m-19.5 0A2.25 2.25 0 004.5 15.75h15a2.25 2.25 0 002.25-2.25m-19.5 0v-3A2.25 2.25 0 014.5 6.75h4.257a1.125 1.125 0 01.97-.562l2.684-1.347a1.125 1.125 0 011.03 0l2.684 1.347a1.125 1.125 0 00.97.562H19.5A2.25 2.25 0 0121.75 9v3"

              <path

            </svg>
          </span>

          <!-- Nom -->
          <div class="min-w-0 flex-1">
            <p class="truncate text-sm font-medium text-gray-900">{{ ligne.name }}</p>
            <p v-if="ligne.chemin" class="truncate text-xs text-gray-400">{{ ligne.chemin }}</p>

          <!-- Infos -->
          <span class="hidden text-xs text-gray-400 sm:block">
            {{ ligne.type === 'file' ? formatTaille(ligne.size) : '' }}

          <!-- Action -->
          <button

            type="button"
            class="shrink-0 rounded-lg px-2.5 py-1 text-xs font-medium text-blue-600 hover:bg-blue-50"

          >

          <button

            type="button"
            class="shrink-0 inline-flex items-center gap-1 rounded-lg px-2.5 py-1 text-xs font-medium text-blue-600 hover:bg-blue-50"
            @click="telecharger(ligne)"
          >

            </svg>

          </button>

        <li v-if="lignes.length === 0" class="px-4 py-10 text-center text-sm text-gray-500">
          Aucun élément trouvé.
        </li>

<script setup>
import { computed, ref } from 'vue'

// ── Données (remplacez par votre API) ──────────────────────────
const racine = {
  id: 'root',
  name: 'Portail',
  type: 'folder',
  children: [
    {
      id: 'documents',
      name: 'Documents',
      type: 'folder',
      children: [
        {
          id: 'banque',
          name: 'Banque',
          type: 'folder',
          children: [
            { id: 'f1', name: 'releve_janvier.pdf', type: 'file', extension: 'pdf', size: 245760 },
            { id: 'f2', name: 'export_virements.csv', type: 'file', extension: 'csv', size: 18432 }
          ]
        },
        {
          id: 'assurance',
          name: 'Assurance',
          type: 'folder',
          children: [
            { id: 'f3', name: 'contrat_auto.pdf', type: 'file', extension: 'pdf', size: 512000 }
          ]
        }
      ]
    },
    {
      id: 'archives',
      name: 'Archives',
      type: 'folder',
      children: [
        { id: 'f4', name: 'bilan_2025.pdf', type: 'file', extension: 'pdf', size: 2097152 }
      ]
    },
    { id: 'f5', name: 'README.txt', type: 'file', extension: 'txt', size: 1024 }
  ]
}

// ── État ─────────────────────────────────────────────────────
const ouverts = ref({ root: true })
const recherche = ref('')

// ── Arborescence aplatie (sans composant récursif) ───────────
function trier(items) {
  return [...items].sort((a, b) => {
    if (a.type !== b.type) return a.type === 'folder' ? -1 : 1
    return a.name.localeCompare(b.name, 'fr')
  })
}

function aplatir(noeds, profondeur = 0, liste = []) {
  for (const item of trier(noeds)) {
    liste.push({ ...item, profondeur })
    if (item.type === 'folder' && ouverts.value[item.id] && item.children?.length) {
      aplatir(item.children, profondeur + 1, liste)
    }
  }
  return liste
}

function chercher(noeds, q, parents = [], result = []) {
  for (const item of noeds) {
    const chemin = [...parents, item.name]
    if (item.name.toLowerCase().includes(q)) {
      result.push({ ...item, profondeur: 0, chemin: parents.join(' / ') })
    }
    if (item.children) chercher(item.children, q, chemin, result)
  }
  return result
}

const lignes = computed(() => {
  if (recherche.value) {
    return chercher(racine.children, recherche.value.toLowerCase(), [racine.name])
  }
  return aplatir([racine])
})

// ── Actions ──────────────────────────────────────────────────
function basculer(id) {
  ouverts.value = { ...ouverts.value, [id]: !ouverts.value[id] }
}

function ouvrir(item) {
  ouverts.value = { ...ouverts.value, [item.id]: true }
}

function telecharger(item) {
  if (item.url) {
    const lien = document.createElement('a')
    lien.href = item.url
    lien.download = item.name
    lien.click()
    return
  }
  const contenu = `Fichier : ${item.name}\nTaille : ${formatTaille(item.size)}`
  const blob = new Blob([contenu], { type: 'text/plain;charset=utf-8' })
  const url = URL.createObjectURL(blob)
  const lien = document.createElement('a')
  lien.href = url
  lien.download = item.name
  lien.click()
  URL.revokeObjectURL(url)
}

function formatTaille(octets) {
  if (!octets) return '—'
  if (octets < 1024) return `${octets} o`
  if (octets < 1024 * 1024) return `${(octets / 1024).toFixed(1)} Ko`
  return `${(octets / (1024 * 1024)).toFixed(1)} Mo`
}
</script>
