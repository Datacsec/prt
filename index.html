<template>
  <div class="max-w-7xl mx-auto w-full">
    <div class="mb-6">
      <h2 class="text-2xl font-semibold text-gray-900 mb-1">Explorateur de dossiers</h2>
      <p class="text-sm text-gray-500">
        Parcourez et gérez vos fichiers (données de démonstration — branchez votre API).
      </p>
    </div>

    <div class="mb-4 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
      <div class="flex flex-wrap items-center gap-2">
        <button
          type="button"
          :disabled="!canGoUp"
          class="inline-flex items-center rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm font-medium text-gray-700 shadow-sm transition-colors hover:bg-gray-50 disabled:cursor-not-allowed disabled:opacity-40"
          title="Dossier parent"
          @click="goUp"
        >
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7" />
          </svg>
        </button>
        <button
          type="button"
          class="inline-flex items-center rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm font-medium text-gray-700 shadow-sm transition-colors hover:bg-gray-50"
          title="Actualiser"
          @click="refresh"
        >
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"
            />
          </svg>
        </button>

        <nav aria-label="Fil d'Ariane" class="flex min-w-0 flex-1 flex-wrap items-center gap-1 text-sm">
          <template v-for="(crumb, index) in breadcrumbs" :key="crumb.id">
            <span v-if="index > 0" class="text-gray-400">/</span>
            <button
              type="button"
              :class="[
                'truncate rounded px-1.5 py-0.5 transition-colors',
                index === breadcrumbs.length - 1
                  ? 'font-medium text-gray-900'
                  : 'text-blue-600 hover:bg-blue-50 hover:text-blue-700'
              ]"
              @click="navigateTo(crumb.id)"
            >
              {{ crumb.name }}
            </button>
          </template>
        </nav>
      </div>

      <div class="relative w-full sm:max-w-xs">
        <svg
          class="pointer-events-none absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-gray-400"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
          />
        </svg>
        <input
          v-model.trim="recherche"
          type="search"
          placeholder="Rechercher un fichier ou dossier…"
          class="w-full rounded-lg border border-gray-300 bg-white py-2 pl-9 pr-3 text-sm text-gray-900 shadow-sm placeholder:text-gray-400 focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500"
        />
      </div>
    </div>

    <div class="grid gap-4 lg:grid-cols-[240px_1fr]">
      <!-- Arborescence -->
      <aside class="hidden rounded-lg border border-gray-200 bg-white p-3 shadow-sm lg:block">
        <p class="mb-2 px-2 text-[11px] font-semibold uppercase tracking-wider text-gray-400">
          Arborescence
        </p>
        <ul class="space-y-0.5 text-sm">
          <ExplorateurTreeNode
            v-for="node in arbreRacine"
            :key="node.id"
            :node="node"
            :current-id="currentFolderId"
            :expanded-ids="expandedIds"
            @toggle="toggleExpand"
            @select="navigateTo"
          />
        </ul>
      </aside>

      <!-- Contenu du dossier courant -->
      <section class="overflow-hidden rounded-lg border border-gray-200 bg-white shadow-sm">
        <div class="flex items-center justify-between border-b border-gray-100 px-4 py-3">
          <p class="text-sm text-gray-600">
            <span class="font-medium text-gray-900">{{ entriesFiltrees.length }}</span>
            élément(s)
          </p>
          <p v-if="selectedEntry" class="truncate text-xs text-gray-500">
            Sélection : {{ selectedEntry.name }}
          </p>
        </div>

        <div class="overflow-x-auto">
          <table class="min-w-full divide-y divide-gray-200 text-sm">
            <thead class="bg-gray-50">
              <tr>
                <th scope="col" class="px-4 py-3 text-left font-semibold text-gray-700">Nom</th>
                <th scope="col" class="hidden px-4 py-3 text-left font-semibold text-gray-700 sm:table-cell">
                  Type
                </th>
                <th scope="col" class="hidden px-4 py-3 text-right font-semibold text-gray-700 md:table-cell">
                  Taille
                </th>
                <th scope="col" class="hidden px-4 py-3 text-left font-semibold text-gray-700 lg:table-cell">
                  Modifié le
                </th>
              </tr>
            </thead>
            <tbody class="divide-y divide-gray-200 bg-white">
              <tr
                v-for="entry in entriesFiltrees"
                :key="entry.id"
                :class="[
                  'cursor-pointer transition-colors',
                  selectedEntry?.id === entry.id ? 'bg-blue-50' : 'hover:bg-gray-50/80'
                ]"
                @click="selectEntry(entry)"
                @dblclick="openEntry(entry)"
              >
                <td class="px-4 py-3">
                  <div class="flex items-center gap-3">
                    <span
                      :class="[
                        'flex h-8 w-8 shrink-0 items-center justify-center rounded-lg',
                        entry.type === 'folder' ? 'bg-amber-50' : 'bg-gray-100'
                      ]"
                    >
                      <svg
                        class="h-4 w-4"
                        :class="entry.type === 'folder' ? 'text-amber-600' : 'text-gray-500'"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24"
                      >
                        <path
                          v-if="entry.type === 'folder'"
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="2"
                          d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"
                        />
                        <path
                          v-else
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="2"
                          d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"
                        />
                      </svg>
                    </span>
                    <span class="font-medium text-gray-900">{{ entry.name }}</span>
                  </div>
                </td>
                <td class="hidden px-4 py-3 text-gray-600 sm:table-cell">
                  {{ entry.type === 'folder' ? 'Dossier' : (entry.extension || 'Fichier').toUpperCase() }}
                </td>
                <td class="hidden px-4 py-3 text-right font-mono tabular-nums text-gray-700 md:table-cell">
                  {{ entry.type === 'folder' ? '—' : formatSize(entry.size) }}
                </td>
                <td class="hidden px-4 py-3 font-mono tabular-nums text-gray-700 whitespace-nowrap lg:table-cell">
                  {{ formatDate(entry.modifiedAt) }}
                </td>
              </tr>
              <tr v-if="entriesFiltrees.length === 0">
                <td colspan="4" class="px-4 py-10 text-center text-sm text-gray-500">
                  Aucun élément ne correspond à votre recherche.
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>

    <!-- Panneau détail -->
    <div
      v-if="selectedEntry"
      class="mt-4 rounded-lg border border-gray-200 bg-white p-4 shadow-sm"
    >
      <h3 class="mb-3 text-sm font-semibold text-gray-900">Détails</h3>
      <dl class="grid gap-3 text-sm sm:grid-cols-2 lg:grid-cols-4">
        <div>
          <dt class="text-xs font-medium uppercase tracking-wide text-gray-500">Nom</dt>
          <dd class="mt-0.5 text-gray-900">{{ selectedEntry.name }}</dd>
        </div>
        <div>
          <dt class="text-xs font-medium uppercase tracking-wide text-gray-500">Type</dt>
          <dd class="mt-0.5 text-gray-900">
            {{ selectedEntry.type === 'folder' ? 'Dossier' : `Fichier .${selectedEntry.extension}` }}
          </dd>
        </div>
        <div v-if="selectedEntry.type === 'file'">
          <dt class="text-xs font-medium uppercase tracking-wide text-gray-500">Taille</dt>
          <dd class="mt-0.5 font-mono tabular-nums text-gray-900">{{ formatSize(selectedEntry.size) }}</dd>
        </div>
        <div>
          <dt class="text-xs font-medium uppercase tracking-wide text-gray-500">Dernière modification</dt>
          <dd class="mt-0.5 font-mono tabular-nums text-gray-900">{{ formatDate(selectedEntry.modifiedAt) }}</dd>
        </div>
      </dl>
      <div v-if="selectedEntry.type === 'folder'" class="mt-4">
        <button
          type="button"
          class="rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white shadow-sm transition-colors hover:bg-blue-700"
          @click="openEntry(selectedEntry)"
        >
          Ouvrir le dossier
        </button>
      </div>
    </div>
  </div>
</template>

<script setup>
import { computed, ref } from 'vue'
import { racineExplorateur } from '../data/explorateurDossiers.js'
import ExplorateurTreeNode from './ExplorateurTreeNode.vue'

function buildIndex(node, parentId = null, map = new Map()) {
  map.set(node.id, { node, parentId })
  if (node.children) {
    for (const child of node.children) {
      buildIndex(child, node.id, map)
    }
  }
  return map
}

const index = buildIndex(racineExplorateur)
const currentFolderId = ref('root')
const expandedIds = ref({ root: true })
const recherche = ref('')
const selectedEntry = ref(null)

const arbreRacine = computed(() => [racineExplorateur])

const currentFolder = computed(() => index.get(currentFolderId.value)?.node ?? racineExplorateur)

const breadcrumbs = computed(() => {
  const crumbs = []
  let id = currentFolderId.value
  while (id) {
    const entry = index.get(id)
    if (!entry) break
    crumbs.unshift({ id: entry.node.id, name: entry.node.name })
    id = entry.parentId
  }
  return crumbs
})

const canGoUp = computed(() => currentFolderId.value !== 'root')

const entries = computed(() => {
  const children = currentFolder.value.children || []
  return [...children].sort((a, b) => {
    if (a.type !== b.type) return a.type === 'folder' ? -1 : 1
    return a.name.localeCompare(b.name, 'fr')
  })
})

const entriesFiltrees = computed(() => {
  const q = recherche.value.toLowerCase()
  if (!q) return entries.value
  return entries.value.filter((e) => e.name.toLowerCase().includes(q))
})

function expandPathTo(id) {
  let cursor = index.get(id)?.parentId
  const next = { ...expandedIds.value }
  while (cursor) {
    next[cursor] = true
    cursor = index.get(cursor)?.parentId
  }
  expandedIds.value = next
}

function navigateTo(id) {
  if (!index.has(id)) return
  const target = index.get(id).node
  if (target.type !== 'folder') return
  currentFolderId.value = id
  selectedEntry.value = null
  expandPathTo(id)
}

function goUp() {
  const parentId = index.get(currentFolderId.value)?.parentId
  if (parentId) navigateTo(parentId)
}

function selectEntry(entry) {
  selectedEntry.value = entry
}

function openEntry(entry) {
  if (entry.type === 'folder') {
    navigateTo(entry.id)
  }
}

function toggleExpand(id) {
  expandedIds.value = {
    ...expandedIds.value,
    [id]: !expandedIds.value[id]
  }
}

function refresh() {
  recherche.value = ''
  selectedEntry.value = null
}

function formatSize(bytes) {
  if (bytes == null) return '—'
  if (bytes < 1024) return `${bytes} o`
  if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} Ko`
  return `${(bytes / (1024 * 1024)).toFixed(1)} Mo`
}

function formatDate(iso) {
  if (!iso) return '—'
  return new Intl.DateTimeFormat('fr-FR', {
    dateStyle: 'short',
    timeStyle: 'short'
  }).format(new Date(iso))
}
</script>
